name: build

on:
  push:
    branches: [main, "**"]
  pull_request:
    branches: [main]

jobs:
  # Clean-runner verification: the feed-gateway has no proprietary dependency, so the full Maven test
  # suite (incl. the WebSocket JWT handshake-auth tests) runs on every commit — the reviewed head has
  # real CI results, not a skipped placeholder.
  maven-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Build and test
        run: mvn -B -ntp test
