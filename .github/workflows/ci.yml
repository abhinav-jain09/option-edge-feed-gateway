name: build

on:
  push:
  pull_request:

jobs:
  maven-test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the head commit
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Print build context
        run: |
          echo "commit=${GITHUB_SHA}"
          java -version
          mvn -version

      # The gateway depends on the private internal artifact
      # com.optionsedge:options-edge-contracts:0.1.0-SNAPSHOT, which is not
      # published to any public Maven repository. Build and install it from
      # source so the gateway build is reproducible in a clean runner.
      # Requires a repo secret CONTRACTS_PAT: a PAT with read access to
      # abhinav-jain09/options-edge-contracts.
      - name: Build internal dependency (options-edge-contracts)
        env:
          CONTRACTS_PAT: ${{ secrets.CONTRACTS_PAT }}
        run: |
          if [ -z "${CONTRACTS_PAT}" ]; then
            echo "::error::CONTRACTS_PAT secret is required to resolve the private com.optionsedge:options-edge-contracts dependency. Add a PAT with read access to abhinav-jain09/options-edge-contracts."
            exit 1
          fi
          git clone --depth 1 "https://x-access-token:${CONTRACTS_PAT}@github.com/abhinav-jain09/options-edge-contracts.git" "${RUNNER_TEMP}/options-edge-contracts"
          mvn -B -q -f "${RUNNER_TEMP}/options-edge-contracts/pom.xml" install -DskipTests

      - name: Build and test
        run: mvn -B clean test

      - name: Upload surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/
          if-no-files-found: ignore
