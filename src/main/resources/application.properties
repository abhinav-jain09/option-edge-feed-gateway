# P1 (log redaction): if container access logging is enabled, log the request PATH only (%U) and NEVER the
# query string (%q), so a ticket (or any secret) can never leak into access/proxy logs. Tickets now travel
# in the Sec-WebSocket-Protocol header rather than the URL, so this is defense in depth. The pattern only
# takes effect when access logging is turned on (server.tomcat.accesslog.enabled=true); it never widens it.
server.tomcat.accesslog.pattern=%h %l %u %t "%m %U %H" %s %b %D
