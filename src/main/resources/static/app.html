<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OptionsEdge — Option Chain</title>
  <link rel="stylesheet" href="/option-chain.css">
  <style>
    #oe-booterr{font-family:system-ui,sans-serif;color:#e2e8f0;background:#0f172a;padding:40px;text-align:center}
    #oe-booterr a{color:#60a5fa}
    #oe-replay-bar{position:fixed;top:8px;right:8px;z-index:9999;display:none;gap:8px;align-items:center;
      background:#0b1220ee;border:1px solid #334155;border-radius:10px;padding:8px 10px;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;color:#e2e8f0;font-size:12px;box-shadow:0 4px 16px #0008}
    #oe-replay-bar input{width:118px;padding:5px 6px;background:#0b1220;color:#e2e8f0;border:1px solid #334155;border-radius:6px;font:inherit}
    #oe-replay-bar input.d{width:128px}
    #oe-replay-bar button{font:inherit;font-weight:600;border:0;border-radius:6px;padding:6px 11px;cursor:pointer}
    #oe-replay-bar .go{background:#2563eb;color:#fff}
    #oe-replay-bar .stop{background:#7c2d12;color:#fed7aa}
    #oe-replay-bar .live{background:#166534;color:#dcfce7}
    #oe-replay-bar button:disabled{opacity:.4;cursor:not-allowed}
    #oe-replay-badge{font-weight:700;letter-spacing:.04em;padding:4px 9px;border-radius:999px;border:1px solid #334155}
    #oe-replay-badge.LIVE{background:#052e16;color:#4ade80;border-color:#166534}
    #oe-replay-badge.REPLAY_RUNNING{background:#1e1b4b;color:#a5b4fc;border-color:#4338ca}
    #oe-replay-badge.REPLAY_COMPLETE{background:#422006;color:#fbbf24;border-color:#92400e}
    #oe-replay-badge.RETURNING_TO_LIVE{background:#1e293b;color:#94a3b8}
    #oe-replay-bar .msg{color:#f87171;max-width:200px}
    #oe-replay-bar label{color:#94a3b8}
  </style>
</head>
<body>
  <div id="oe-replay-bar">
    <span id="oe-replay-badge" class="LIVE">LIVE</span>
    <label>date</label><input id="oe-rp-date" class="d" type="date" value="2026-06-12">
    <label>ET</label><input id="oe-rp-start" type="time" value="14:00">
    <span>–</span><input id="oe-rp-end" type="time" value="14:20">
    <button class="go" id="oe-rp-start-btn">Start Replay</button>
    <button class="stop" id="oe-rp-stop-btn" disabled>Stop</button>
    <button class="live" id="oe-rp-live-btn" disabled>Return to Live</button>
    <span class="msg" id="oe-rp-msg"></span>
  </div>
  <div id="optionChainRoot"></div>
  <noscript>Enable JavaScript to view the option chain.</noscript>
  <script>
  (function () {
    "use strict";
    var S = window.sessionStorage;
    var tok = S.getItem("oe_tok"), refresh = S.getItem("oe_refresh");
    var expAt = Number(S.getItem("oe_expAt") || 0);
    var sel = null; try { sel = JSON.parse(S.getItem("oe_sel") || "null"); } catch (e) {}
    if (!tok || !sel) { location.replace("/index.html"); return; }

    var KC = "http://localhost:8080/realms/optionsedge", CLIENT = "options-edge-web";
    var TOKEN_URL = KC + "/protocol/openid-connect/token";

    function persist() { S.setItem("oe_tok", tok); S.setItem("oe_refresh", refresh); S.setItem("oe_expAt", String(expAt)); }

    // Refresh the access token when it is within 30s of expiry.
    function ensureToken() {
      if (Date.now() < expAt) return Promise.resolve(tok);
      var body = new URLSearchParams({ grant_type: "refresh_token", client_id: CLIENT, refresh_token: refresh });
      return fetch(TOKEN_URL, { method: "POST", headers: { "Content-Type": "application/x-www-form-urlencoded" }, body })
        .then(function (r) { if (!r.ok) { location.replace("/index.html"); return null; } return r.json(); })
        .then(function (j) { if (!j) return null; tok = j.access_token; refresh = j.refresh_token; expAt = Date.now() + (j.expires_in - 30) * 1000; persist(); return tok; })
        .catch(function () { return tok; });
    }

    // Mint a single-use per-session WS ticket scoped to this user's selection.
    function mintTicket() {
      return ensureToken().then(function (t) {
        if (!t) return null;
        return fetch("/api/ws-ticket", {
          method: "POST",
          headers: { "Authorization": "Bearer " + t, "Content-Type": "application/json" },
          body: JSON.stringify({ source: sel.source, symbol: sel.symbol, expiry: sel.expiry, strikeLo: sel.strikeLo, strikeHi: sel.strikeHi })
        }).then(function (r) { return r.ok ? r.json() : null; }).then(function (j) {
          if (j && j.appSessionId) appSessionId = j.appSessionId; // needed to scope replay control calls
          return j ? j.ticket : null;
        }).catch(function () { return null; });
      });
    }

    var appSessionId = null;
    var currentTicket = null, minting = null;
    function refreshTicket() {
      if (minting) return minting;
      minting = mintTicket().then(function (tk) { if (tk) currentTicket = tk; minting = null; return tk; });
      return minting;
    }

    window.__OPTIONS_EDGE_ENV__ = { VITE_APP_PROFILE: "dev" };

    // The config the React app expects from /api/config, derived from the login selection.
    function configJson() {
      return {
        appProfile: "dev", apiBaseUrl: "", missionControlUrl: "", provider: "IB",
        marketDataSource: sel.source, symbol: sel.symbol, expiry: sel.expiry, selectionEpoch: 0,
        tradingClass: "", secType: "", exchange: "", port: 4001, clientId: 0,
        maxStrikes: sel.maxStrikes || 45, delayed: false,
        // Our own Live↔Replay control bar drives the new /api/replay/* endpoints; keep the legacy
        // in-React replay panel (which posts to the old /api/replay/historical) hidden.
        feedGatewayEnabled: true, feedGatewayAvailable: true, feedGatewayWsUrl: "", databentoReplayUiEnabled: false
      };
    }
    function jsonResponse(obj) { return new Response(JSON.stringify(obj), { status: 200, headers: { "Content-Type": "application/json" } }); }

    // Intercept the UI's backend calls it cannot reach on the gateway; pass everything else (incl. /api/ws-ticket) through.
    var realFetch = window.fetch.bind(window);
    window.fetch = function (input, init) {
      var url = typeof input === "string" ? input : (input && input.url) || "";
      if (url.indexOf("/api/config") >= 0) return Promise.resolve(jsonResponse(configJson()));
      if (url.indexOf("/api/connect") >= 0) {
        try {
          if (init && init.body) {
            var p = new URLSearchParams(init.body);
            if (p.get("marketDataSource")) sel.source = p.get("marketDataSource");
            if (p.get("symbol")) sel.symbol = p.get("symbol");
            if (p.get("expiry")) sel.expiry = p.get("expiry");
            if (p.get("maxStrikes")) sel.maxStrikes = Number(p.get("maxStrikes"));
            S.setItem("oe_sel", JSON.stringify(sel));
          }
        } catch (e) {}
        currentTicket = null; refreshTicket();
        return Promise.resolve(jsonResponse({ config: configJson() }));
      }
      return realFetch(input, init);
    };

    // Append the per-session ticket to the gateway WebSocket handshake.
    var RealWS = window.WebSocket;
    function PatchedWS(url, protocols) {
      var u = String(url);
      if (u.indexOf("/ws/events") >= 0 && currentTicket) {
        u += (u.indexOf("?") >= 0 ? "&" : "?") + "ticket=" + encodeURIComponent(currentTicket);
        currentTicket = null;        // single-use
        setTimeout(refreshTicket, 0); // pre-mint the next ticket for reconnects
      }
      return protocols === undefined ? new RealWS(u) : new RealWS(u, protocols);
    }
    PatchedWS.prototype = RealWS.prototype;
    PatchedWS.CONNECTING = RealWS.CONNECTING; PatchedWS.OPEN = RealWS.OPEN;
    PatchedWS.CLOSING = RealWS.CLOSING; PatchedWS.CLOSED = RealWS.CLOSED;
    window.WebSocket = PatchedWS;

    function loadScript(src) {
      return new Promise(function (res, rej) {
        var s = document.createElement("script"); s.src = src; s.onload = res; s.onerror = function () { rej(new Error("failed to load " + src)); };
        document.body.appendChild(s);
      });
    }

    // Boot: mint the first ticket, load React, then the real option-chain app (which auto-connects the WS).
    // ---- Live↔Replay control bar (reqs 1,2,3,4,5,9,10) ----
    // Mode state machine: LIVE → REPLAY_RUNNING → REPLAY_COMPLETE → RETURNING_TO_LIVE → LIVE.
    // Replay data and the live/replay row clearing all happen over the existing per-session
    // WebSocket: the gateway sends a `reset` then streams the window (or replays the live cache),
    // so the React chain clears and re-renders automatically.
    var mode = "LIVE";
    function el(id) { return document.getElementById(id); }
    function setMode(next) {
      mode = next;
      var badge = el("oe-replay-badge"); if (badge) { badge.className = next; badge.textContent = next.replace(/_/g, " "); }
      var running = next === "REPLAY_RUNNING", replayShown = running || next === "REPLAY_COMPLETE";
      if (el("oe-rp-start-btn")) el("oe-rp-start-btn").disabled = running;
      if (el("oe-rp-stop-btn")) el("oe-rp-stop-btn").disabled = !running;
      if (el("oe-rp-live-btn")) el("oe-rp-live-btn").disabled = !replayShown;
    }
    function rpMsg(text) { var m = el("oe-rp-msg"); if (m) m.textContent = text || ""; }

    // Interpret the date + ET wall-clock inputs as a UTC instant (EDT = UTC-04:00 for these dates).
    function etToUtc(dateStr, timeStr) {
      var iso = dateStr + "T" + (timeStr.length === 5 ? timeStr + ":00" : timeStr) + "-04:00";
      var d = new Date(iso);
      if (isNaN(d.getTime())) throw new Error("invalid date/time");
      return d.toISOString();
    }
    function authHeaders(t) { return { "Authorization": "Bearer " + t, "Content-Type": "application/json" }; }

    function startReplay() {
      rpMsg("");
      if (!appSessionId) { rpMsg("no session yet"); return; }
      var date = el("oe-rp-date").value, expiry = date.replace(/-/g, "");
      var startUtc, endUtc;
      try { startUtc = etToUtc(date, el("oe-rp-start").value); endUtc = etToUtc(date, el("oe-rp-end").value); }
      catch (e) { rpMsg(e.message); return; }
      setMode("REPLAY_RUNNING");
      ensureToken().then(function (t) {
        if (!t) { rpMsg("session expired"); setMode("LIVE"); return; }
        return fetch("/api/replay/historical/start", {
          method: "POST", headers: authHeaders(t),
          body: JSON.stringify({ sessionId: appSessionId, symbol: sel.symbol, expiry: expiry, startUtc: startUtc, endUtc: endUtc, maxRecords: 50000 })
        }).then(function (r) {
          return r.json().catch(function () { return {}; }).then(function (j) {
            if (!r.ok) { rpMsg(j.error || ("replay failed (" + r.status + ")")); setMode("LIVE"); }
          });
        });
      }).catch(function () { rpMsg("replay request failed"); setMode("LIVE"); });
    }

    function modeCall(path, nextOnOk, label) {
      if (!appSessionId) return;
      ensureToken().then(function (t) {
        if (!t) { rpMsg("session expired"); return; }
        return fetch(path, { method: "POST", headers: authHeaders(t), body: JSON.stringify({ sessionId: appSessionId }) })
          .then(function (r) { return r.json().catch(function () { return {}; }).then(function (j) {
            if (r.ok) { setMode(nextOnOk); rpMsg(""); } else { rpMsg(j.error || (label + " failed")); }
          }); });
      }).catch(function () { rpMsg(label + " failed"); });
    }

    function setupReplayBar() {
      var bar = el("oe-replay-bar"); if (!bar) return;
      bar.style.display = "flex";
      setMode("LIVE");
      el("oe-rp-start-btn").onclick = startReplay;
      el("oe-rp-stop-btn").onclick = function () { modeCall("/api/replay/historical/stop", "REPLAY_COMPLETE", "stop"); };
      el("oe-rp-live-btn").onclick = function () { setMode("RETURNING_TO_LIVE"); modeCall("/api/replay/live/resume", "LIVE", "return to live"); };
    }

    refreshTicket()
      .then(function () { return loadScript("https://unpkg.com/react@18.3.1/umd/react.production.min.js"); })
      .then(function () { return loadScript("https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"); })
      .then(function () { return loadScript("/option-chain.js"); })
      .then(function () { setupReplayBar(); })
      .catch(function (err) {
        document.getElementById("optionChainRoot").innerHTML =
          '<div id="oe-booterr">Could not load the option chain (' + (err && err.message || "error") +
          ').<br>Check your network, then <a href="/app.html">retry</a> or <a href="/index.html">sign in again</a>.</div>';
      });
  })();
  </script>
</body>
</html>
